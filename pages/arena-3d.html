<div class="cbt-layout" style="max-width: 1200px; margin: auto; position: relative;">
    
    <div style="display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 15px 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; border-bottom: 4px solid #0d6efd;">
        <h2 style="color: #333; margin: 0; font-size: 24px;">
            ☁️ Arena 3D Survival <span id="survival-pin" style="color:#0d6efd; font-weight:bold; background:#e9ecef; padding:5px 15px; border-radius:10px; margin-left: 10px;"></span>
        </h2>
        <button id="btn-keluar-3d" class="btn-cbt" style="background:#dc3545; color:white; padding: 10px 25px; border-radius: 8px; font-weight: bold; border:none; cursor:pointer; font-size: 16px; box-shadow: 0 4px 0 #8b0000; position: relative; z-index: 50;">
            <i class="fa-solid fa-right-from-bracket"></i> Keluar Arena
        </button>
    </div>

    <div id="kontrol-guru-3d" style="display: none; background: #fff3cd; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 2px dashed #ffc107; justify-content: center; gap: 10px; flex-wrap: wrap; position: relative; z-index: 50;">
        <div style="width: 100%; font-weight: bold; margin-bottom: 10px; text-align: center;">Panel Kontrol Guru:</div>
        <button id="btn-mulai-3d" class="btn-cbt" style="background:#198754; color:white; cursor:pointer; z-index:50;"><i class="fa-solid fa-play"></i> Mulai Ronde</button>
        <button id="btn-ungkap-3d" class="btn-cbt" style="background:#dc3545; color:white; cursor:pointer; z-index:50;"><i class="fa-solid fa-bolt"></i> Runtuhkan Lantai!</button>
        <button id="btn-stop-3d" class="btn-cbt" style="background:#333; color:white; cursor:pointer; z-index:50;"><i class="fa-solid fa-rotate-left"></i> Reset ke Lobby</button>
    </div>

    <div id="wadah-3d-survival" style="position: relative; width: 100%; height: 65vh; background: #87CEEB; border-radius: 12px; overflow: hidden; box-shadow: inset 0 0 20px rgba(0,0,0,0.2); border: 4px solid #333;">

        <div style="position: absolute; top: 15px; left: 15px; background: rgba(13, 110, 253, 0.9); color: white; padding: 10px 20px; border-radius: 12px; z-index: 20; box-shadow: 0 4px 8px rgba(0,0,0,0.3); border: 2px solid white; font-weight: bold; font-size: 18px;">
            ⭐ Skor Total Saya: <span id="skor-saya-3d" style="color: gold; font-size: 22px;">0</span>
        </div>

        <div style="position: absolute; top: 15px; right: 15px; background: rgba(0, 0, 0, 0.75); color: white; padding: 15px; border-radius: 12px; z-index: 20; width: 230px; box-shadow: 0 4px 10px rgba(0,0,0,0.4); border: 2px solid gold;">
            <h4 style="margin: 0 0 12px 0; text-align: center; color: gold; font-size: 16px; border-bottom: 1px dashed gold; padding-bottom: 5px;"><i class="fa-solid fa-trophy"></i> TOP 5 GLOBAL</h4>
            <div id="list-highscore-3d" style="font-size: 14px; display: flex; flex-direction: column; gap: 8px;">
                <div style="text-align: center; color: #ccc;">Memuat Data...</div>
            </div>
        </div>

        <div id="canvas-container-3d" style="width: 100%; height: 100%;"></div>
        
        <div style="position: absolute; top: 20px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 10; pointer-events: none; width: 50%;">
            <div id="ui-soal-3d" style="background: rgba(255,255,255,0.95); padding: 15px 30px; display: inline-block; border-radius: 20px; font-weight: bold; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 3px solid #0d6efd; color: #333;">Menunggu Pertanyaan...</div>
        </div>

        <div id="ui-opsi-kiri" style="position: absolute; top: 35%; left: 20px; background: rgba(220, 53, 69, 0.9); color: white; padding: 10px 20px; border-radius: 10px; font-weight: bold; font-size: 22px; z-index: 10; border: 3px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.3);">❌ SALAH</div>
        <div id="ui-opsi-kanan" style="position: absolute; top: 35%; right: 20px; background: rgba(13, 110, 253, 0.9); color: white; padding: 10px 20px; border-radius: 10px; font-weight: bold; font-size: 22px; z-index: 10; border: 3px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.3);">✅ BENAR</div>
        
        <div id="kontrol-siswa-3d" style="position: absolute; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: center; gap: 30px; z-index: 30;">
            <button id="btn-pindah-kiri" class="btn-cbt" style="background: #dc3545; color: white; font-size: 20px; padding: 15px 40px; border: 3px solid white; box-shadow: 0 6px 0 #8b0000; border-radius: 12px; cursor: pointer;"><i class="fa-solid fa-arrow-left"></i> SALAH (Merah)</button>
            <button id="btn-pindah-kanan" class="btn-cbt" style="background: #0d6efd; color: white; font-size: 20px; padding: 15px 40px; border: 3px solid white; box-shadow: 0 6px 0 #00008b; border-radius: 12px; cursor: pointer;">BENAR (Biru) <i class="fa-solid fa-arrow-right"></i></button>
        </div>

        <div id="ui-status-3d" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 40px; font-weight: bold; color: white; text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; z-index: 15; display: none; text-align: center;">GAME OVER</div>
    </div>
</div>
