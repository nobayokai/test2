<style>
    /* KUNCI PERBAIKAN: Paksa susunan dari atas ke bawah (Column) dengan lebar 100% */
    .survival-wrapper {
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 1200px; 
        margin: 0 auto; 
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        gap: 15px; /* Memberi jarak otomatis antar kotak */
    }
    
    /* Header Premium */
    .header-3d {
        display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
        background: #fff; padding: 15px 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
        border-bottom: 4px solid #0d6efd; width: 100%; box-sizing: border-box;
    }
    .header-title { margin: 0; font-size: 1.5rem; color: #333; display: flex; align-items: center; gap: 10px; }
    .pin-badge { color: #0d6efd; background: #e9ecef; padding: 5px 15px; border-radius: 8px; font-weight: 900; }
    .btn-keluar { background: #dc3545; color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; box-shadow: 0 4px 0 #8b0000; cursor: pointer; transition: all 0.1s; }
    .btn-keluar:active { transform: translateY(4px); box-shadow: 0 0 0 #8b0000; }

    /* Panel Guru (Sekarang dijamin melebar 100%) */
    .panel-guru {
        width: 100%; box-sizing: border-box;
        display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; padding: 20px;
        background: #fff3cd; border-radius: 15px; border: 2px dashed #ffc107;
    }
    .btn-guru { border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.15); transition: transform 0.1s; color: white; font-size: 1.1rem; }
    .btn-guru:active { transform: scale(0.95); }

    /* Wadah Utama Arena */
    .arena-container {
        position: relative; width: 100%; height: 70vh; min-height: 500px; background: #87CEEB; 
        border-radius: 20px; overflow: hidden; box-shadow: inset 0 0 30px rgba(0,0,0,0.2), 0 10px 20px rgba(0,0,0,0.3); border: 4px solid #333;
        box-sizing: border-box;
    }

    /* HUD (Head-Up Display) - Skor & Leaderboard bertumpuk rapi */
    .hud-top {
        position: absolute; top: 15px; left: 15px; right: 15px; z-index: 20;
        display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; gap: 10px;
    }
    
    /* Efek Kaca (Glassmorphism) */
    .glass-box {
        background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 15px; color: white; padding: 12px 15px;
        pointer-events: auto; box-shadow: 0 8px 15px rgba(0,0,0,0.3);
    }
    
    .skor-box { font-size: 1rem; font-weight: bold; border-left: 4px solid #0d6efd; display: flex; align-items: center; gap: 10px; }
    .angka-skor { color: gold; font-size: 1.5rem; text-shadow: 1px 1px 2px #000; }
    
    .lb-box { width: 220px; border-top: 4px solid gold; }
    .lb-title { margin: 0 0 10px 0; font-size: 0.9rem; color: gold; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px; }
    
    /* Teks Pertanyaan Mulus di Tengah */
    .question-wrapper {
        position: absolute; top: 90px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 600px; text-align: center; z-index: 15; pointer-events: none;
    }
    .question-box {
        background: rgba(255,255,255,0.95); padding: 12px 25px; display: inline-block; border-radius: 20px;
        font-weight: 800; font-size: 1.2rem; color: #222; box-shadow: 0 6px 15px rgba(0,0,0,0.2); border: 3px solid #0d6efd;
    }

    /* Plang Opsi Mengambang Rapi */
    .plang-opsi {
        position: absolute; top: 40%; transform: translateY(-50%);
        color: white; padding: 8px 15px; border-radius: 10px; font-weight: 900; font-size: 1.2rem;
        border: 2px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.4); z-index: 10; opacity: 0.9;
    }
    #ui-opsi-kiri { left: 5%; background: #dc3545; }
    #ui-opsi-kanan { right: 5%; background: #0d6efd; }

    /* Area Tombol Bawah (Rapi dan Tidak Nabrak) */
    .action-area {
        position: absolute; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 30; padding: 0 15px; box-sizing: border-box;
    }
    .btn-lari {
        flex: 1; max-width: 250px; padding: 15px; font-size: 1.2rem; font-weight: 900; color: white; border-radius: 15px; border: 3px solid rgba(255,255,255,0.5);
        cursor: pointer; box-shadow: 0 6px 0 rgba(0,0,0,0.5); transition: transform 0.1s, box-shadow 0.1s; display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-lari:active { transform: translateY(6px); box-shadow: 0 0 0 rgba(0,0,0,0.5); }
    #btn-pindah-kiri { background: linear-gradient(145deg, #e74c3c, #c0392b); }
    #btn-pindah-kanan { background: linear-gradient(145deg, #3498db, #2980b9); }

    /* Game Over Text */
    #ui-status-3d {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; font-weight: 900; color: white;
        text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000; text-align: center; z-index: 40; line-height: 1.2; width: 100%;
    }

    /* === RESPONSIVE UNTUK HP KECIL === */
    @media (max-width: 768px) {
        .header-3d { flex-direction: column; text-align: center; }
        .hud-top { flex-direction: column; align-items: center; top: 10px; }
        .lb-box { width: 90%; max-width: 300px; padding: 10px; }
        .question-wrapper { top: 180px; }
        .question-box { font-size: 1rem; padding: 10px 15px; }
        .plang-opsi { top: 45%; font-size: 1rem; padding: 5px 10px; }
        .action-area { gap: 10px; bottom: 15px; }
        .btn-lari { font-size: 1rem; padding: 12px 5px; border-width: 2px; }
        #ui-status-3d { font-size: 2rem; width: 90%; }
        .panel-guru { flex-direction: column; }
        .btn-guru { width: 100%; }
    }
</style>

<div class="survival-wrapper">
    
    <div class="header-3d">
        <h2 class="header-title">
            ☁️ Arena 3D Survival <span id="survival-pin" class="pin-badge"></span>
        </h2>
        <button id="btn-keluar-3d" class="btn-keluar">
            <i class="fa-solid fa-right-from-bracket"></i> Keluar Arena
        </button>
    </div>

    <div id="kontrol-guru-3d" class="panel-guru" style="display: none;">
        <div style="width: 100%; font-weight: bold; text-align: center; color: #856404; font-size: 1.2rem;">Panel Kontrol Guru</div>
        <button id="btn-mulai-3d" class="btn-guru" style="background:#198754;"><i class="fa-solid fa-play"></i> Mulai Ronde</button>
        <button id="btn-ungkap-3d" class="btn-guru" style="background:#dc3545;"><i class="fa-solid fa-bolt"></i> Runtuhkan Lantai!</button>
        <button id="btn-stop-3d" class="btn-guru" style="background:#333;"><i class="fa-solid fa-rotate-left"></i> Reset ke Lobby</button>
    </div>

    <div id="wadah-3d-survival" class="arena-container">

        <div class="hud-top">
            <div class="glass-box skor-box">
                Skor Saya: <span id="skor-saya-3d" class="angka-skor">0</span>
            </div>

            <div class="glass-box lb-box">
                <h4 class="lb-title"><i class="fa-solid fa-trophy"></i> TOP 5 GLOBAL</h4>
                <div id="list-highscore-3d">
                    <div style="text-align: center; color: #aaa; font-size: 0.8rem;">Memuat Data...</div>
                </div>
            </div>
        </div>

        <div class="question-wrapper">
            <div id="ui-soal-3d" class="question-box">Menunggu Pertanyaan...</div>
        </div>

        <div id="ui-opsi-kiri" class="plang-opsi" style="display: none;">❌ SALAH</div>
        <div id="ui-opsi-kanan" class="plang-opsi" style="display: none;">✅ BENAR</div>

        <div id="kontrol-siswa-3d" class="action-area">
            <button id="btn-pindah-kiri" class="btn-lari">
                <i class="fa-solid fa-arrow-left"></i> SALAH
            </button>
            <button id="btn-pindah-kanan" class="btn-lari">
                BENAR <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>

        <div id="canvas-container-3d" style="width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1;"></div>

        <div id="ui-status-3d" style="display: none;">GAME OVER</div>
    </div>
</div>
