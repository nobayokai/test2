<div class="cbt-layout" style="max-width: 1000px; margin: auto;">
    <div class="cbt-main" style="padding: 20px; display: flex; flex-direction: column; gap: 20px;">
        
        <div style="background: #333; color: white; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #ff5722; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">
            <div style="display: flex; gap: 20px; align-items: center;">
                <h3 style="margin: 0; color: #ff5722;"><i class="fa-solid fa-flag-checkered"></i> PIN SIRKUIT: <span id="balap-pin" style="letter-spacing: 2px; color: white;">-----</span></h3>
                <p id="balap-materi" style="margin: 0; font-size: 14px; color: #ccc;">Materi: Memuat...</p>
            </div>
            <div style="display: flex; gap: 20px; align-items: center;">
                <h2 id="balap-waktu" style="margin: 0; font-size: 32px; color: white; font-family: 'Courier New', monospace;">00:00</h2>
                <button onclick="keluarBalap()" class="btn-cbt" style="background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight:bold;"><i class="fa-solid fa-door-open"></i> Keluar</button>
            </div>
        </div>

        <div id="track-balap-wadah" style="background: #222; padding: 20px 0; border-radius: 10px; display: flex; flex-direction: column; border: 5px solid #444; position: relative; overflow: hidden; min-height: 250px; box-shadow: inset 0 0 30px rgba(0,0,0,0.8);">
            <div id="garis-finish" style="position: absolute; right: 0; top: 0; bottom: 0; width: 40px; background-color: #222; border-left: 2px dashed #ff5722; display: flex; flex-direction: column; z-index: 1;">
                <div style="flex:1; background-image: repeating-conic-gradient(white 0% 25%, black 25% 50%, white 50% 75%, black 75% 100%); background-size: 10px 10px;"></div>
            </div>
            <div id="wadah-3d-sirkuit" style="display: none; width: 100%; height: 40vh; min-height: 300px; background: #87CEEB; border-radius: 15px; overflow: hidden; box-shadow: inset 0 0 20px rgba(0,0,0,0.3); border: 4px solid #333; margin-bottom: 15px; position: relative;">
                    <div id="canvas-sirkuit-3d" style="width: 100%; height: 100%; position: absolute; top: 0; left: 0;"></div>
                    <div id="indikator-finish" style="position: absolute; top: 10px; right: 20px; background: rgba(0,0,0,0.7); color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; border: 2px solid gold; z-index: 10;">
                        🏁 Menuju Finish
                    </div>
                </div>
            <div id="daftar-pemain-track" style="display: flex; flex-direction: column; gap: 0px; z-index: 2; position: relative;">
                <div style="text-align:center; color:#888; margin-top: 50px;">Menunggu pemain masuk...</div>
            </div>
        </div>

        <div id="balap-status-panel" style="background: #f8f9fa; border: 2px solid #ccc; border-radius: 10px; padding: 15px; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
            <div style="display: flex; align-items: center; gap: 10px;">
                <i class="fa-solid fa-traffic-light" style="font-size: 24px; color: #198754;"></i>
                <h4 id="balap-status-teks" style="margin: 0; color: #333;">MENUNGGU ABA-ABA MULAI DARI GURU...</h4>
            </div>
            
            <div id="kontrol-guru-balap" style="display: none; margin-left: auto; align-items: center; gap: 10px;">
                <div id="pengaturan-waktu-balap" style="display: flex; align-items: center; gap: 10px;">
                    <label style="font-size: 13px; font-weight: bold; color: #555;">Waktu (Detik):</label>
                    <input type="number" id="input-waktu-balap" value="120" style="width: 70px; padding: 5px; text-align: center; font-weight: bold; border-radius: 5px; border: 1px solid #ccc;">
                </div>
                <button id="btn-host-mulai-balap" class="btn-cbt" style="background: #198754; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;"><i class="fa-solid fa-flag-checkered"></i> MULAI</button>
                <button id="btn-host-stop-balap" class="btn-cbt" style="background: #dc3545; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; display: none;"><i class="fa-solid fa-stop"></i> STOP</button>
            </div>
        </div>

        <div id="wadah-utama-balap" style="position: relative; background: white; border: 3px solid #0d6efd; border-radius: 10px; padding-bottom: 30px; overflow: hidden; box-shadow: inset 0 0 20px rgba(0,0,0,0.05);">
            
            <div id="area-mengetik-balap" style="max-height: 250px; overflow-y: auto; overflow-x: hidden; padding: 20px; position: relative; cursor: text; scroll-behavior: smooth;">
                
                <div id="wadah-teks-berjalan" style="font-family: 'Courier New', Courier, monospace; font-size: 22px; white-space: pre-wrap; text-align: justify; line-height: 1.6; user-select: none; pointer-events: none;">
                    <span id="teks-selesai" style="color: #198754; font-weight: bold; opacity: 0.6;"></span><span id="teks-salah" style="background: #dc3545; color: white; text-decoration: underline;"></span><span id="teks-aktif" style="background: #ffc107; color: black; border-bottom: 4px solid #333; font-weight: bold; padding: 0 2px;"></span><span id="teks-sisa" style="color: #666;">Menunggu...</span>
                </div>

                <textarea id="input-balap-ketik" autocomplete="off" spellcheck="false" style="position: absolute; opacity: 0; top: 0; left: 0; height: 1px; width: 1px; z-index: -1; resize: none;" disabled></textarea>
                
                <textarea id="input-balap-bebas" autocomplete="off" spellcheck="false" placeholder="Ketik teks dari buku Anda di sini... (Tekan Enter untuk baris baru)" style="width: 100%; min-height: 200px; padding: 15px; font-size: 18px; border: 2px dashed #0d6efd; border-radius: 8px; font-family: 'Courier New', monospace; outline: none; resize: none; display: none; background: white; z-index: 10; position: relative;" disabled></textarea>

            </div>

            <div id="wpm-display" style="position: absolute; bottom: 5px; right: 20px; font-weight: bold; color: #0d6efd; font-size: 18px; font-family: 'Courier New', monospace; z-index: 11; background: white; padding: 2px 5px; border-radius: 5px;">0 WPM</div>
            <div style="position: absolute; bottom: 5px; left: 20px; font-size: 12px; color: #888; z-index: 11; background: white; padding: 2px 5px; border-radius: 5px;"><i class="fa-solid fa-keyboard"></i> Ketik terus...</div>
        </div>

    </div>
</div>
