<div class="cbt-layout" style="max-width: 900px; margin: auto; text-align: center;">
    <div class="cbt-main" style="padding: 40px 20px;">
        <i class="fa-solid fa-layer-group fa-bounce" style="font-size: 60px; color: #6610f2; margin-bottom: 15px;"></i>
        <h1 style="color: #333; margin-bottom: 10px;">Edu-Game Hub</h1>
        <p style="color: #666; margin-bottom: 40px; font-size: 16px;">Pusat permainan edukasi interaktif kelas Anda.</p>

        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 30px;">
            
            <div style="background: white; border: 2px solid #0d6efd; border-radius: 12px; padding: 30px; width: 350px; box-shadow: 0 10px 20px rgba(13, 110, 253, 0.15);">
                <h3 style="color: #0d6efd; margin-top: 0;"><i class="fa-solid fa-right-to-bracket"></i> Gabung Permainan</h3>
                <p style="color: #555; font-size: 14px; margin-bottom: 20px;">Sistem akan otomatis mendeteksi jenis permainan dari PIN yang Anda masukkan.</p>
                <input type="text" id="input-pin-game" placeholder="Contoh: 88492" style="width: 100%; padding: 15px; font-size: 24px; text-align: center; font-weight: bold; border: 2px dashed #ccc; border-radius: 8px; margin-bottom: 15px; letter-spacing: 3px;">
                <button id="btn-gabung-game" class="btn-cbt" style="background: #0d6efd; color: white; width: 100%; font-size: 18px; padding: 12px;"><i class="fa-solid fa-play"></i> MASUK ROOM</button>
            </div>

            <div id="area-manajemen-guru" style="background: white; border: 2px solid #198754; border-radius: 12px; padding: 20px; width: 100%; max-width: 500px; box-shadow: 0 10px 20px rgba(25, 135, 84, 0.15); display: none; text-align: left;">
                
                <div style="display: flex; gap: 10px; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px;">
                    <button class="tab-guru-btn active" data-target="tab-buat-room" style="flex:1; padding:10px; border:none; background:#198754; color:white; border-radius:5px; font-weight:bold; cursor:pointer;"><i class="fa-solid fa-play"></i> Buat Room</button>
                    <button class="tab-guru-btn" data-target="tab-buat-db" style="flex:1; padding:10px; border:none; background:#e9ecef; color:#333; border-radius:5px; font-weight:bold; cursor:pointer;"><i class="fa-solid fa-folder-plus"></i> Tambah Materi</button>
                    <button class="tab-guru-btn" data-target="tab-lihat-db" style="flex:1; padding:10px; border:none; background:#e9ecef; color:#333; border-radius:5px; font-weight:bold; cursor:pointer;"><i class="fa-solid fa-table-list"></i> Database</button>
                </div>

                <div id="tab-buat-room" class="tab-guru-konten">
                    <h3 style="color: #198754; margin-top: 0;"><i class="fa-solid fa-plus-circle"></i> Buat Room Baru</h3>
                    
                    <label style="font-weight: bold; font-size: 13px;">1. Pilih Jenis Permainan:</label>
                    <select id="select-jenis-game" style="width: 100%; padding: 10px; border: 2px solid #0d6efd; border-radius: 8px; margin-bottom: 15px; font-weight: bold; color: #0d6efd; outline: none;">
                        <option value="tebak_kata">🎯 Mode: Tebak Kata Live</option>
                        <option value="balap_ketik">🏎️ Mode: Balap Ketik (TypeRush Database)</option>
                        <option value="balap_ketik_free">📖 Mode: Balap Ketik Bebas (Salin Buku)</option>
                        <option value="battle_royale">⚔️ PVP Battle Royale (Saling Serang)</option>
                    </select>

                    <label style="font-weight: bold; font-size: 13px;">2. Pilih Materi Database:</label>
                    <select id="select-materi-game" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 15px;">
                        <option value="">-- Memuat Materi... --</option>
                    </select>
                    
                    <button id="btn-buat-room" class="btn-cbt" style="background: #198754; color: white; width: 100%; font-size: 18px; padding: 12px;"><i class="fa-solid fa-satellite-dish"></i> BUAT ROOM SEKARANG</button>
                </div>

                <div id="tab-buat-db" class="tab-guru-konten" style="display: none;">
                    <h3 style="color: #0d6efd; margin-top: 0;" id="judul-form-db"><i class="fa-solid fa-file-circle-plus"></i> Tambah Materi Baru</h3>
                    <input type="hidden" id="db-mode" value="baru">
                    <input type="text" id="db-kode" placeholder="Kode Materi (Cth: IPA-01)" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 10px;">
                    <input type="text" id="db-nama" placeholder="Nama Materi (Cth: Hewan Mamalia)" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 10px;">
                    <textarea id="db-kata" rows="4" placeholder="Ketik kata/kalimat (Pisahkan dengan koma)" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 15px;"></textarea>
                    <div style="display: flex; gap: 10px;">
                        <button id="btn-simpan-db" class="btn-cbt" style="background: #0d6efd; color: white; flex: 2; padding: 10px;">Simpan Database</button>
                        <button id="btn-batal-edit-db" class="btn-cbt" style="background: #6c757d; color: white; flex: 1; padding: 10px; display: none;">Batal</button>
                    </div>
                </div>

                <div id="tab-lihat-db" class="tab-guru-konten" style="display: none;">
                    <h3 style="color: #6610f2; margin-top: 0;"><i class="fa-solid fa-database"></i> Database Materi</h3>
                    <div style="max-height: 250px; overflow-y: auto; border: 1px solid #ddd; border-radius: 5px;">
                        <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 13px;">
                            <tbody id="tbody-database-game"><tr><td style="text-align:center; padding:15px;">Memuat...</td></tr></tbody>
                        </table>
                    </div>
                    <button onclick="muatDatabaseGameTabel()" style="width: 100%; margin-top: 10px; padding: 8px; background: #e9ecef; border: 1px solid #ccc; border-radius: 5px; cursor: pointer;"><i class="fa-solid fa-rotate"></i> Segarkan Tabel</button>
                </div>

            </div>
        </div>
    </div>
</div>
