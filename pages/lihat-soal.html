<div class="cbt-layout" style="max-width: 1100px; margin: auto;">
    <div class="cbt-main" style="padding: 30px;">
        <h2 style="color: #198754; border-bottom: 2px solid #198754; padding-bottom: 10px; margin-bottom: 20px;">
            <i class="fa-solid fa-list-check"></i> Daftar Soal Ujian
        </h2>

        <div style="background: #f8f9fa; padding: 15px; border-radius: 5px; margin-bottom: 20px; border: 1px solid #dee2e6; display: flex; align-items: center; gap: 15px;">
            <label for="filter-kode-soal" style="font-weight: bold; color: #495057;">Pilih Kode Soal:</label>
            <select id="filter-kode-soal" style="padding: 10px; border-radius: 4px; border: 1px solid #ccc; font-weight: bold; min-width: 200px; outline: none;">
                <option value="">-- Memuat Data... --</option>
            </select>
        </div>

        <div style="overflow-x: auto;">
            <table class="tabel-stylish" id="tabel-soal">
                <thead>
                    <tr>
                        <th width="5%">No.</th>
                        <th width="15%">Tipe Soal</th>
                        <th width="35%">Pertanyaan</th>
                        <th width="15%">Pilihan Jawaban</th>
                        <th width="10%">Kunci</th>
                        <th width="5%">Poin</th>
                        <th width="10%">Aksi</th>
                    </tr>
                </thead>
                <tbody id="body-tabel-soal">
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 30px; color: #666; font-style: italic;">
                            Silakan pilih kode soal di atas untuk menampilkan data.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
