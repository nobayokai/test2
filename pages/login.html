<div style="display: flex; justify-content: center; align-items: center; height: 60vh;">
    <div style="background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; max-width: 400px;">
        <h2 style="text-align: center; margin-bottom: 20px; color: #198754;">Login Sistem</h2>
        
        <div id="login-alert" style="display: none; padding: 10px; margin-bottom: 15px; border-radius: 4px; text-align: center; font-size: 14px;"></div>

        <form id="login-form">
            <input type="text" id="username" placeholder="Username / NIS" required style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px;">
            <input type="password" id="password" placeholder="Password" required style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px;">
            <button type="submit" id="btn-login" style="width: 100%; padding: 10px; background-color: #198754; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">Masuk</button>
        </form>
    </div>
</div>
